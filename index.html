<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Castleluck</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1 class="title">Castleluck</h1>


<!-- МЕНЮ -->

<div id="menu" class="screen">

<button onclick="UI.showCampaigns()">Кампания</button>

<button onclick="UI.showCards()">Исторические карточки</button>

<button onclick="UI.showAchievements()">Достижения</button>

</div>



<!-- КАМПАНИИ -->

<div id="campaigns" class="screen hidden">

<h2>Выберите кампанию</h2>

<button onclick="Game.startCampaign('europe')">Европа</button>

<button onclick="Game.startCampaign('rus')">Русь</button>

<br>

<button onclick="UI.back()">Назад</button>

</div>



<!-- ВЫБОР АРМИИ -->

<div id="armies" class="screen hidden">

<h2>Выберите армию</h2>

<div id="armyList"></div>

<button onclick="UI.back()">Назад</button>

</div>



<!-- ИГРА -->

<div id="game" class="screen hidden">


<!-- КАРТА -->

<div id="map" class="map"></div>



<!-- ЗАМОК -->

<div id="castle">

<div id="wallVisual" class="wall1"></div>

</div>



<!-- ПОЛОСЫ -->

<div class="bars">

<div class="bar">

Игрок

<div class="hp">

<div id="playerBar"></div>

</div>

</div>


<div class="bar">

Гарнизон

<div class="hp">

<div id="enemyBar"></div>

</div>

</div>


<div class="bar">

Стены

<div class="hp">

<div id="wallBar"></div>

</div>

</div>


</div>



<!-- TP -->

<div class="tp">

TP: <span id="tpValue">0</span>

</div>



<!-- КНОПКИ -->

<div class="actions">

<button class="action" onclick="Game.attack()">⚔</button>

<button class="action" onclick="Game.siege()">🧱</button>

<button class="action" onclick="Game.heal()">❤️</button>

<button class="action" onclick="Game.special()">🔥</button>

</div>



<!-- ЛОГ -->

<div id="log" class="log"></div>


</div>



<!-- ПОБЕДА -->

<div id="victory" class="screen hidden">

<h2>🏆 ГОРОД ЗАХВАЧЕН</h2>

<div class="flag">🚩</div>

<p id="victoryCity"></p>

<button onclick="UI.closeVictory()">Продолжить</button>

</div>



<!-- ИСТОРИЯ -->

<div id="history" class="screen hidden">

<h2 id="histTitle"></h2>

<p id="histDesc"></p>

<ul id="histFacts"></ul>

<a id="wiki" target="_blank">Статья Wikipedia</a>

<br><br>

<button onclick="UI.closeHistory()">Продолжить</button>

</div>



<!-- ВИКТОРИНА -->

<div id="quiz" class="screen hidden">

<h3 id="quizQuestion"></h3>

<div id="quizAnswers"></div>

</div>



<!-- КАРТОЧКИ -->

<div id="cards" class="screen hidden">

<h2>Исторические карточки</h2>

<div id="cardsList"></div>

<button onclick="UI.back()">Назад</button>

</div>



<!-- ДОСТИЖЕНИЯ -->

<div id="achievements" class="screen hidden">

<h2>Достижения</h2>

<div id="achList"></div>

<button onclick="UI.back()">Назад</button>

</div>



<!-- СКРИПТЫ -->

<script src="data.js"></script>

<script src="cards.js"></script>

<script src="quiz.js"></script>

<script src="achievements.js"></script>

<script src="audio.js"></script>

<script src="ai.js"></script>

<script src="armies.js"></script>

<script src="map.js"></script>

<script src="game.js"></script>

<script src="ui.js"></script>


</body>

</html>
