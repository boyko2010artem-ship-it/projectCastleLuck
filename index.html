<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Castleluck</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<h1>Castleluck</h1>

<div id="menu">

<button onclick="UI.showCampaigns()">Играть</button>

<button onclick="UI.showAchievements()">Достижения</button>

<button onclick="UI.showCards()">История</button>

</div>

<div id="campaigns" class="hidden">

<h2>Выбор кампании</h2>

<button onclick="Game.chooseCampaign('europe')">
Европа
</button>

<button onclick="Game.chooseCampaign('rus')">
Русь
</button>

</div>

<div id="armies" class="hidden">

<h2>Выбор армии</h2>

<div id="armyList"></div>

</div>

<div id="game" class="hidden">

<h2 id="cityName"></h2>

<div id="map"></div>

<div id="castle">

<div id="wallVisual"></div>

</div>

<div class="bar">
Стены
<div class="hp"><div id="wallBar"></div></div>
</div>

<div class="bar">
Гарнизон
<div class="hp"><div id="enemyBar"></div></div>
</div>

<div class="bar">
Игрок
<div class="hp"><div id="playerBar"></div></div>
</div>

<div id="tp">
Очки действий:
<span id="tpValue">0</span>
</div>

<div class="actions">

<button onclick="Game.attack()">⚔</button>
<button onclick="Game.siege()">🧱</button>
<button onclick="Game.heal()">💚</button>
<button onclick="Game.special()">🚀</button>

</div>

<div id="log"></div>

</div>

<div id="history" class="hidden">

<h2 id="histTitle"></h2>

<p id="histDesc"></p>

<ul id="histFacts"></ul>

<a id="wiki" target="_blank">Wikipedia</a>

<button onclick="UI.closeHistory()">Продолжить</button>

</div>

<div id="quiz" class="hidden">

<h2 id="quizQuestion"></h2>

<div id="quizAnswers"></div>

</div>

<div id="cards" class="hidden">

<h2>Исторические карточки</h2>

<div id="cardsList"></div>

<button onclick="UI.back()">Назад</button>

</div>

<div id="achievements" class="hidden">

<h2>Достижения</h2>

<div id="achList"></div>

<button onclick="UI.back()">Назад</button>

</div>

</div>

<script src="data.js"></script>
<script src="armies.js"></script>
<script src="cards.js"></script>
<script src="quiz.js"></script>
<script src="audio.js"></script>
<script src="achievements.js"></script>
<script src="map.js"></script>
<script src="ai.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
