<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Castleluck</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="app">

<h1 class="logo">Castleluck</h1>

<div id="mainMenu" class="screen">

<button onclick="Game.startCampaign('europe')">
🌍 Кампания Европы
</button>

<button onclick="Game.startCampaign('rus')">
🛡 Кампания Руси
</button>

<button onclick="UI.openAchievements()">
🏆 Достижения
</button>

</div>

<div id="gameScreen" class="screen hidden">

<div class="bars">

<div class="bar">
Игрок
<div class="hp"><div id="playerBar"></div></div>
</div>

<div class="bar">
Враг
<div class="hp"><div id="enemyBar"></div></div>
</div>

</div>

<div id="tpBox">
Очки действий: <span id="playerTP">0</span>
</div>

<div id="actions">

<button onclick="Game.attack()">⚔</button>
<button onclick="Game.build()">🧱</button>
<button onclick="Game.heal()">💚</button>
<button onclick="Game.rocket()">🚀</button>

</div>

<div id="log"></div>

</div>

<div id="achievementsScreen" class="screen hidden">

<h2>Достижения</h2>

<div id="achievementsList"></div>

<button onclick="UI.backMenu()">Назад</button>

</div>

<div id="historyModal" class="modal hidden">

<h2 id="historyTitle"></h2>

<p id="historyDesc"></p>

<ul id="historyFacts"></ul>

<a id="wikiLink" target="_blank">Wikipedia</a>

<br>

<button onclick="UI.closeHistory()">Продолжить</button>

</div>

</div>

<script src="data.js"></script>
<script src="audio.js"></script>
<script src="achievements.js"></script>
<script src="save.js"></script>
<script src="map.js"></script>
<script src="ai.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
