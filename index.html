<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Castleluck</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>Castleluck</h1>

<!-- MENU -->

<div id="menu">

<button onclick="UI.showCampaigns()">
Начать игру
</button>

<button onclick="UI.showCards()">
Исторические карточки
</button>

<button onclick="UI.showAchievements()">
Достижения
</button>

</div>


<!-- CAMPAIGNS -->

<div id="campaigns" class="hidden">

<h2>Выбор кампании</h2>

<button onclick="Game.chooseCampaign('europe')">
Европа
</button>

<button onclick="Game.chooseCampaign('rus')">
Русь
</button>

</div>


<!-- ARMIES -->

<div id="armies" class="hidden">

<h2>Выбор армии</h2>

<div id="armyList"></div>

</div>


<!-- GAME -->

<div id="game" class="hidden">

<h2 id="cityName"></h2>

<div class="map" id="map"></div>


<div id="castle">

<div id="wallVisual" class="wall1"></div>

</div>


<div class="bar">

Игрок

<div class="hp">

<div id="playerBar"></div>

</div>

</div>


<div class="bar">

Гарнизон

<div class="hp">

<div id="enemyBar"></div>

</div>

</div>


<div class="bar">

Стены

<div class="hp">

<div id="wallBar"></div>

</div>

</div>


<p>Очки действий: <span id="tpValue">0</span></p>


<div>

<button onclick="Game.attack()">Атака</button>

<button onclick="Game.siege()">Осада</button>

<button onclick="Game.heal()">Лечение</button>

<button onclick="Game.special()">Спецудар</button>

</div>


<div id="log"></div>

</div>


<!-- HISTORY -->

<div id="history" class="hidden">

<h2 id="histTitle"></h2>

<p id="histDesc"></p>

<ul id="histFacts"></ul>

<br>

<a id="wiki" target="_blank">
Wikipedia
</a>

<br><br>

<button onclick="UI.closeHistory()">
Продолжить
</button>

</div>


<!-- QUIZ -->

<div id="quiz" class="hidden">

<h2>Исторический вопрос</h2>

<p id="quizQuestion"></p>

<div id="quizAnswers"></div>

</div>


<!-- CARDS -->

<div id="cards" class="hidden">

<h2>Исторические карточки</h2>

<div id="cardsList"></div>

<button onclick="UI.back()">
Назад
</button>

</div>


<!-- ACHIEVEMENTS -->

<div id="achievements" class="hidden">

<h2>Достижения</h2>

<div id="achList"></div>

<button onclick="UI.back()">
Назад
</button>

</div>


<script src="data.js"></script>
<script src="armies.js"></script>
<script src="quiz.js"></script>
<script src="achievements.js"></script>
<script src="audio.js"></script>
<script src="map.js"></script>
<script src="ai.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>

</html>
